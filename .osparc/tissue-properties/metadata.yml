name: Tissue properties
description: >-
  Tissue properties compiled in an extensive, critical literature review
  by the ITIS Foundation. Visit
  [itis.swiss/database](https://itis.swiss/database) for additional
  information, e.g., on tissue parameter variability/uncertainty,
  quality assurance, and the explored sources. Please use the following
  citation when referring to the database: Hasgall PA, Di Gennaro F,
  Baumgartner C, Neufeld E, Lloyd B, Gosselin MC, Payne D, Klingenböck A,
  Kuster N, ITIS Database for thermal and electromagnetic parameters of
  biological tissues, Version 4.0, May 15, 2018,
  DOI: 10.13099/VIP21000-04-0. [itis.swiss/database](https://itis.swiss/database).
  Powered by [csv-to-html-table](https://github.com/derekeder/csv-to-html-table).
key: simcore/services/dynamic/tissue-properties
version: 1.0.9
version_display: "5.0-sasaki"
integration-version: 2.0.0
type: dynamic
authors:
- name: odeimaiz
  email: maiz@itis.swiss
  affiliation: IT'IS Foundation
- name: neagu
  email: neagu@itis.swiss
  affiliation: IT'IS Foundation
contact: neagu@itis.swiss
inputs: {}
outputs:
