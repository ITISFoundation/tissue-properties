# Local validation of the production image.
#
# Mirrors how the dynamic-sidecar will run the container in oSPARC:
#   - mounts ./validation/outputs as the sidecar outputs directory,
#   - injects DY_SIDECAR_PATH_OUTPUTS,
#   - publishes :8080 on the host.
#
# The image must already be built — run `make build` first.

services:
  tissue-properties:
    image: simcore/services/dynamic/tissue-properties:1.0.10
    ports:
      - "8080:8080"
    environment:
      DY_SIDECAR_PATH_OUTPUTS: /var/outputs
      SERVER_LOG_LEVEL: ${SERVER_LOG_LEVEL:-info}
    volumes:
      - ./validation/outputs:/var/outputs
