# Development stack: Vite dev server with HMR.
#
# Bind-mounts the viewer sources from the host so edits trigger reload.
# The development image must already be built — run `make build-devel` first.

services:
  tissue-properties:
    image: itisfoundation/tissue-properties:1.0.10-devel
    ports:
      - "8080:8080"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DY_SIDECAR_PATH_OUTPUTS: /var/outputs
      TISSUE_PROPERTIES_CSV: /app/src/csv-to-html-table/data/TissueProperties.csv
      SIMCORE_NODE_BASEPATH: ${SIMCORE_NODE_BASEPATH:-}
    volumes:
      - ./src:/app/src
      - ./vite.config.js:/app/vite.config.js
      - ./validation/outputs:/var/outputs
